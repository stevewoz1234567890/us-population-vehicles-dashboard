<section class="chart-block" aria-labelledby="cars-chart-title">
  <h2 id="cars-chart-title" class="title">Cars per household in USA 2021</h2>
  <div class="chart-box">
    @if (loading()) {
      <p class="state">Loading…</p>
    } @else if (error()) {
      <p class="state error">{{ error() }}</p>
    }
    <canvas #chartCanvas></canvas>
  </div>
</section>
